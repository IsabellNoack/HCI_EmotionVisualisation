<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Noise Waves</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      canvas {
        display: block;
      }

      /* Custom scrollbar for the UI panel */
      .ui-panel-content::-webkit-scrollbar {
        width: 6px;
      }
      .ui-panel-content::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 4px;
      }
      .ui-panel-content::-webkit-scrollbar-thumb {
        background: rgba(255, 200, 120, 0.3);
        border-radius: 4px;
      }
      .ui-panel-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 200, 120, 0.6);
      }
    </style>
  </head>
  <body>
    <script type="module" src="./main.js"></script>
  </body>
</html>
